name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          npm run release 2>&1 | tee release.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ] && grep -Eqi '"code":"already_exists"|already exists|asset.*exists|422 Unprocessable Entity|Validation Failed' release.log; then
            echo "Release assets already exist on GitHub; continuing without failing workflow."
            exit 0
          fi

          exit "$status"
